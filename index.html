<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Path to Immortal: RPG</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <header>
            <h1>Путь Мастера</h1>
            <div id="rank-display">Ранг: <span id="rank-name">Новичок</span></div>
        </header>

        <section id="stats-panel">
            <h2>Ваш Герой</h2>
            <p>Уровень: <span id="level">1</span> | Золото: <span id="gold">0</span></p>
            
            <div class="stat-label">Опыт: <span id="exp">0</span> / <span id="next-lvl-exp">100</span></div>
            <div class="progress-bar exp"><div id="exp-fill"></div></div>
            
            <div class="stat-label">Здоровье: <span id="hp">100</span> / <span id="max-hp">100</span></div>
            <div class="progress-bar health"><div id="hp-fill"></div></div>

            <div class="stats-grid">
                <div>Сила: <span id="stat-strength">10</span></div>
                <div>Магия: <span id="stat-magic">10</span></div>
            </div>
        </section>

        <section id="action-panel">
            <h2>Действия</h2>
            <div class="actions-grid">
                <button onclick="train('strength')">Тренажер (+Сила)</button>
                <button onclick="train('magic')">Медитация (+Магия)</button>
                <button onclick="hunt()" class="danger-btn">Охота (Риск HP)</button>
                <button onclick="rest()" class="heal-btn">Отдых (5 золота)</button>
            </div>
        </section>

        <section id="shop-panel">
            <h2>Лавка Кузнеца</h2>
            <div class="shop-item">
                <span>Стальной меч (+5 Силы, +Бонус к золоту)</span>
                <button id="buy-sword" onclick="buyItem('sword', 50)">50г</button>
            </div>
        </section>

        <div id="log-panel">
            <div id="game-log">Вы прибыли в деревню...</div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
