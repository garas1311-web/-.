<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Immortal Path: World Update</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <header>
            <h1>Путь Мастера: <span id="rank-name">Новичок</span></h1>
            <div id="location-name">Текущая локация: Деревня</div>
        </header>

        <section id="stats-panel">
            <div class="stats-header">Уровень <span id="level">1</span> | Золото: <span id="gold">0</span></div>
            
            <div class="stat-group">
                <div class="stat-label">Опыт: <span id="exp">0</span> / <span id="next-lvl-exp">100</span></div>
                <div class="progress-bar exp"><div id="exp-fill"></div></div>
            </div>
            
            <div class="stat-group">
                <div class="stat-label">Здоровье: <span id="hp">100</span> / <span id="max-hp">100</span></div>
                <div class="progress-bar health"><div id="hp-fill"></div></div>
            </div>

            <div class="stat-group">
                <div class="stat-label">Мана: <span id="mp">50</span> / <span id="max-mp">50</span></div>
                <div class="progress-bar mana"><div id="mp-fill"></div></div>
            </div>

            <div class="stats-grid">
                <div>⚔️ Сила: <span id="stat-strength">10</span></div>
                <div>🔮 Магия: <span id="stat-magic">10</span></div>
            </div>
        </section>

        <nav id="map-panel">
            <h3>Карта Мира</h3>
            <div class="map-grid">
                <button onclick="changeLoc('Лес')">🌲 Лес (ур. 1)</button>
                <button onclick="changeLoc('Пещеры')">🦇 Пещеры (ур. 5)</button>
                <button onclick="changeLoc('Замок')">🏰 Замок (ур. 10)</button>
            </div>
        </nav>

        <section id="action-panel">
            <h3>Действия</h3>
            <div class="actions-grid">
                <button onclick="hunt('sword')" class="danger-btn">⚔️ Атака мечом</button>
                <button onclick="hunt('magic')" class="magic-btn">🔥 Огненный шар (10 MP)</button>
                <button onclick="rest()" class="heal-btn">🛌 Отдых (10г)</button>
                <button onclick="train()">🏋️ Тренировка</button>
            </div>
        </section>

        <section id="shop-panel">
            <h3>Лавка</h3>
            <div class="shop-list">
                <div class="shop-item">
                    <span>Меч (+10 Сила)</span>
                    <button id="buy-sword" onclick="buyItem('sword', 100)">100г</button>
                </div>
                <div class="shop-item">
                    <span>Посох (+10 Магия)</span>
                    <button id="buy-staff" onclick="buyItem('staff', 100)">100г</button>
                </div>
                <div class="shop-item">
                    <span>Броня (+50 HP)</span>
                    <button id="buy-armor" onclick="buyItem('armor', 200)">200г</button>
                </div>
            </div>
        </section>

        <div id="log-panel">
            <div id="game-log">Мир ждет своего героя...</div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
