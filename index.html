<div id="game-container">
    <div id="tooltip" class="hidden"></div>

    <div class="header">
        <h2 style="color:var(--gold)">НОВИЧОК</h2>
        <p>📍 Деревня</p>
        <div class="stats-bar">
            Ур. <span id="lvl-val">1</span> | 💰 <span id="gold-val">180</span>
        </div>
    </div>

    <div id="battle-arena">
        <div class="knight-sprite" onmouseover="showStats()" onmouseout="hideStats()"></div>
        
        <div id="enemy-sprite">🐗</div>
    </div>

    <div class="grid-btns">
        <button class="btn-attack" onclick="attack()">⚔️ Рубить</button>
        <button class="btn-util" onclick="skill()">🔥 Сжечь</button>
        <button class="btn-rest" onclick="rest()">🛌 Отдых</button>
        <button class="btn-util" style="background:#d1ccc0; color:#333" onclick="toggleInv()">🎒 Инвентарь</button>
    </div>

    <div id="log" style="height: 100px; background: #000; margin-top:15px; padding:10px; font-size:12px; overflow-y:auto; border-radius:5px;">
        > Игра началась...
    </div>
</div>

<div id="inv-modal" class="modal hidden">
    <div class="modal-content">
        <h3>🎒 Твои Вещи</h3>
        <div id="inv-grid" style="display:grid; grid-template-columns: repeat(3, 1fr); gap:10px;"></div>
        <button onclick="toggleInv()" style="margin-top:20px; width:100%; background:#444">Закрыть</button>
    </div>
</div>
