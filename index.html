<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Immortal Squad: Gold Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <header>
            <h1><span id="rank-icon">🌑</span> <span id="rank-name">Новичок</span></h1>
            <div id="location-name">📍 Деревня</div>
        </header>

        <section id="dashboard-profile">
            <div class="profile-main">
                <div id="progression-avatar">
                    <svg viewBox="0 0 50 50">
                        <circle cx="25" cy="25" r="20" fill="#2c3e50" stroke="#ffd700" stroke-width="2"/>
                        <path d="M25 12 L35 35 L15 35 Z" fill="#f1c40f"/>
                    </svg>
                </div>
                <div class="stats-header">
                    <span>Ур. <span id="level">1</span></span>
                    <span class="stat-gold">💰 <span id="gold">0</span></span>
                </div>
            </div>
            <div class="progress-bar exp"><div id="exp-fill"></div></div>
        </section>

        <section id="battle-arena" class="loc-Лес">
            <div id="squad-stage">
                <div class="unit" id="unit-knight">
                    <svg viewBox="0 0 60 90" class="knight-svg">
                        <path d="M20 35 Q 5 50 15 75 L35 75 Q 45 50 30 35" fill="#8e0000"/>
                        <rect x="18" y="35" width="24" height="35" fill="#34495e" rx="3" stroke="#f1c40f" stroke-width="1"/>
                        <path d="M18 18 L42 18 L42 38 L18 38 Z" fill="#5d6d7e" stroke="#f1c40f" stroke-width="1.5"/>
                        <rect x="22" y="24" width="16" height="3" fill="#1a1a1a"/> <circle cx="18" cy="38" r="6" fill="#f1c40f"/>
                        <circle cx="42" cy="38" r="6" fill="#f1c40f"/>
                        <g transform="rotate(-15 45 45)">
                            <rect x="42" y="30" width="4" height="35" fill="#ecf0f1" stroke="#2c3e50" stroke-width="0.5"/>
                            <rect x="38" y="55" width="12" height="3" fill="#f1c40f"/>
                        </g>
                    </svg>
                </div>
                
                <div class="unit" id="unit-archer">
                    <svg viewBox="0 0 50 80">
                        <rect x="15" y="30" width="20" height="30" fill="#27ae60" rx="2"/>
                        <path d="M17 15 L33 15 L25 5 Z" fill="#2ecc71"/>
                        <path d="M35 30 Q 50 45 35 60" stroke="#f1c40f" fill="none" stroke-width="2"/>
                    </svg>
                </div>

                <div class="unit" id="unit-mage">
                    <svg viewBox="0 0 50 80">
                        <rect x="15" y="30" width="20" height="30" fill="#8e44ad" rx="2"/>
                        <circle cx="25" cy="20" r="10" fill="#9b59b6"/>
                        <rect x="38" y="20" width="3" height="45" fill="#34495e"/>
                        <circle cx="39.5" cy="20" r="5" fill="#00d2ff" class="orb-glow"/>
                    </svg>
                </div>
            </div>

            <div id="enemy-stage">
                <div id="enemy-sprite">🌲</div>
            </div>
        </section>

        <section class="actions-grid">
            <button class="danger-btn" onclick="squadAttack()">⚔️ Рубить</button>
            <button class="magic-btn" onclick="squadAttack()">🔥 Сжечь</button>
            <button class="heal-btn" onclick="rest()">🛌 Отдых</button>
            <button class="event-btn">🎲 Приключение</button>
        </section>

        <section id="shop-panel">
            <h3>🛒 Кузница</h3>
            <div class="shop-item"><span>⚔️ Клинки (+20 СИЛ)</span><button>150г</button></div>
            <div class="shop-item"><span>🔮 Сферы (+25 МАГ)</span><button>200г</button></div>
        </section>

        <div id="log-panel"><div id="game-log">Отряд готов к бою...</div></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
