<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Immortal Path: Hero Visualized</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <header>
            <h1><span class="icon-rank">🎖️</span> <span id="rank-name">Новичок</span></h1>
            <div id="location-name">📍 Деревня</div>
        </header>

        <section id="stats-panel">
            <div class="stats-header">
                <span>Уровень <span id="level">1</span></span>
                <span class="stat-gold">💰 <span id="gold">0</span></span>
            </div>
            
            <div class="stat-group exp-group">
                <div class="stat-label">Опыт: <span id="exp">0</span> / <span id="next-lvl-exp">100</span></div>
                <div class="progress-bar exp"><div id="exp-fill"></div></div>
            </div>
            
            <div class="stat-group hp-group">
                <div class="stat-label">❤️ HP: <span id="hp">100</span> / <span id="max-hp">100</span></div>
                <div class="progress-bar health"><div id="hp-fill"></div></div>
            </div>

            <div class="stat-group mp-group">
                <div class="stat-label">✨ MP: <span id="mp">50</span> / <span id="max-mp">50</span></div>
                <div class="progress-bar mana"><div id="mp-fill"></div></div>
            </div>

            <div class="stats-grid icon-stats">
                <div>💪 <span id="stat-strength">10</span></div>
                <div>🔮 <span id="stat-magic">10</span></div>
            </div>
        </section>

        <section id="character-viewer">
            <div class="character-stage">
                <svg class="pixel-knight" viewBox="0 0 50 80" xmlns="http://www.w3.org/2000/svg">
                    <rect x="15" y="30" width="20" height="30" fill="#7f8c8d" rx="2"/>
                    <rect x="17" y="15" width="16" height="18" fill="#95a5a6" rx="5"/>
                    <rect x="20" y="22" width="10" height="3" fill="#2c3e50"/> <rect x="17" y="60" width="7" height="15" fill="#7f8c8d"/>
                    <rect x="26" y="60" width="7" height="15" fill="#7f8c8d"/>
                    <circle cx="12" cy="35" r="5" fill="#95a5a6"/>
                    <circle cx="38" cy="35" r="5" fill="#95a5a6"/>
                    <g class="knight-sword" transform="translate(42, 10) rotate(15)">
                        <rect x="0" y="10" width="4" height="40" fill="#bdc3c7"/>
                        <rect x="-3" y="10" width="10" height="3" fill="#e74c3c"/> </g>
                </svg>
            </div>
        </section>

        <section id="quest-panel">
            <h3>📜 Квест</h3>
            <div id="quest-info">Заданий пока нет.</div>
            <div class="progress-bar quest"><div id="quest-fill"></div></div>
        </section>

        <nav id="map-panel">
            <div class="map-grid">
                <button onclick="changeLoc('Лес')">🌲 Лес</button>
                <button onclick="changeLoc('Пещеры')">🦇 Пещеры</button>
                <button onclick="changeLoc('Замок')">🏰 Замок</button>
            </div>
        </nav>

        <section id="action-panel">
            <div class="actions-grid">
                <button onclick="hunt('sword')" class="danger-btn">⚔️ Рубить</button>
                <button onclick="hunt('magic')" class="magic-btn">🔥 Сжечь</button>
                <button onclick="rest()" class="heal-btn">🛌 Отдых</button>
                <button onclick="train()" class="train-btn">🏋️ Зал</button>
            </div>
        </section>

        <section id="shop-panel">
            <h3>🛒 Лавка</h3>
            <div class="shop-list">
                <div class="shop-item" id="item-sword">
                    <span class="item-name">🗡️ Меч (+15 СИЛ)</span>
                    <button onclick="buyItem('sword', 100)">100г</button>
                </div>
                <div class="shop-item" id="item-staff">
                    <span class="item-name">🪄 Посох (+15 МАГ)</span>
                    <button onclick="buyItem('staff', 150)">150г</button>
                </div>
                <div class="shop-item" id="item-armor">
                    <span class="item-name">🛡️ Броня (+50 HP)</span>
                    <button onclick="buyItem('armor', 250)">250г</button>
                </div>
            </div>
        </section>

        <div id="log-panel">
            <div id="game-log">Мир ждет своего героя...</div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
