<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Immortal Squad: Ultimate Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="tooltip" class="hidden"></div>

    <div id="game-container">
        <div id="control-panel">
            <label><input type="checkbox" id="auto-battle-chk" onchange="toggleAutoBattle()"> 🤖 Автобой</label>
            <label>⏱️ <select id="speed-select" onchange="changeSpeed()">
                <option value="1">x1</option>
                <option value="2" selected>x2</option>
                <option value="4">x4</option>
            </select></label>
            <div id="location-tag">📍 <span id="loc-text">Лес</span></div>
        </div>

        <header>
            <div class="header-main">
                <span id="rank-icon">🌑</span> <span id="rank-name">Новичок</span>
                <span class="stage-badge">Этап <span id="stage-display">1</span></span>
            </div>
        </header>

        <section id="dashboard-profile">
            <div class="stats-row">
                <span>Ур. <span id="level">1</span></span>
                <span class="stat-gold">💰 <span id="gold">0</span></span>
                <span class="stat-tp">💎 <span id="tp">0</span></span>
            </div>
            <div class="progress-bar exp"><div id="exp-fill"></div></div>
        </section>

        <section id="battle-arena" class="bg-forest">
            <div id="boss-dialogue" class="hidden"></div>

            <div id="squad-stage">
                <div class="unit-wrapper" id="wrapper-knight" onmouseover="showStats('knight')" onmouseout="hideStats()">
                    <div class="unit" id="unit-knight">
                        <svg viewBox="0 0 60 90" class="hero-svg">
                            <path d="M20 35 Q 5 50 15 75 L35 75 Q 45 50 30 35" fill="#8e0000"/>
                            <rect x="18" y="35" width="24" height="35" fill="#34495e" rx="3" stroke="#f1c40f" stroke-width="1"/>
                            <path d="M18 18 L42 18 L42 38 L18 38 Z" fill="#5d6d7e" stroke="#f1c40f" stroke-width="1.5"/>
                            <g class="weapon-group"><rect x="42" y="30" width="4" height="35" fill="#ecf0f1"/></g>
                        </svg>
                        <div class="shield-aura hidden">🛡️</div>
                    </div>
                    <div class="unit-ui">
                        <div class="mini-hp-bar"><div class="mini-hp" id="hp-knight"></div></div>
                        <div class="mini-en-bar"><div class="mini-en" id="en-knight"></div></div>
                        <button class="skill-btn hidden" id="skill-knight" onclick="useUltimate('knight')">УДАР</button>
                    </div>
                </div>

                <div class="unit-wrapper hidden" id="wrapper-archer" onmouseover="showStats('archer')" onmouseout="hideStats()">
                    <div class="unit" id="unit-archer">
                        <svg viewBox="0 0 60 90" class="hero-svg">
                            <path d="M20 35 Q 5 50 15 75 L35 75 Q 45 50 30 35" fill="#1e5128"/>
                            <rect x="20" y="35" width="20" height="35" fill="#5c4033" rx="3" stroke="#d4af37" stroke-width="1"/>
                            <path d="M18 18 L42 18 L42 38 L18 38 Z" fill="#2d3436" stroke="#1e5128" stroke-width="1.5"/>
                        </svg>
                    </div>
                    <div class="unit-ui">
                        <div class="mini-hp-bar"><div class="mini-hp" id="hp-archer"></div></div>
                        <div class="mini-en-bar"><div class="mini-en" id="en-archer"></div></div>
                        <button class="skill-btn hidden" id="skill-archer" onclick="useUltimate('archer')">ЗАЛП</button>
                    </div>
                </div>

                <div class="unit-wrapper hidden" id="wrapper-mage" onmouseover="showStats('mage')" onmouseout="hideStats()">
                    <div class="unit" id="unit-mage">
                        <svg viewBox="0 0 60 90" class="hero-svg">
                            <path d="M15 35 L45 35 L50 80 L10 80 Z" fill="#301934" stroke="#8e44ad" stroke-width="1"/>
                            <circle cx="30" cy="25" r="10" fill="#1a0b2e" />
                        </svg>
                    </div>
                    <div class="unit-ui">
                        <div class="mini-hp-bar"><div class="mini-hp" id="hp-mage"></div></div>
                        <div class="mini-en-bar"><div class="mini-en" id="en-mage"></div></div>
                        <button class="skill-btn hidden" id="skill-mage" onclick="useUltimate('mage')">ВЗРЫВ</button>
                    </div>
                </div>
            </div>

            <div id="enemy-stage">
                <div id="enemy-sprite">🐺</div>
                <div class="enemy-hp-container">
                    <div id="enemy-hp-fill"></div>
                    <div id="enemy-hp-text">100/100</div>
                </div>
                <div id="enemy-name">Дикий Волк</div>
            </div>
            
            <div id="combat-text-layer"></div>
        </section>

        <section class="actions-grid">
            <button id="btn-adventure" class="danger-btn" onclick="manualStartCombat()">⚔️ В БОЙ</button>
            <button class="heal-btn" onclick="restSquad()">🛌 ОТДЫХ</button>
            <button class="magic-btn" onclick="toggleModal('inventory-modal')">🎒 ВЕЩИ</button>
            <button class="talent-btn" onclick="toggleModal('talents-modal')">💎 СКИЛЛЫ</button>
        </section>

        <section id="shop-panel">
            <div class="shop-tabs">
                <button class="tab-btn active" onclick="switchTab('upgrades')">Апгрейды</button>
                <button class="tab-btn" onclick="switchTab('mercs')">Команда</button>
            </div>
            <div id="tab-upgrades" class="shop-list tab-content active">
                <div class="shop-item"><span>⚔️ Мечи (+10 атк)</span><button onclick="buyUpgrade('dmg', 150)">150г</button></div>
                <div class="shop-item"><span>🛡️ Латы (+50 хп)</span><button onclick="buyUpgrade('hp', 150)">150г</button></div>
            </div>
            <div id="tab-mercs" class="shop-list tab-content">
                <div class="shop-item" id="merc-archer"><span>🏹 Лучник</span><button onclick="buyMerc('archer', 500)">500г</button></div>
                <div class="shop-item" id="merc-mage"><span>🔮 Маг</span><button onclick="buyMerc('mage', 2000)">2000г</button></div>
            </div>
        </section>

        <div id="log-panel"><div id="game-log"></div></div>
    </div>

    <div id="inventory-modal" class="modal hidden">
        <div class="modal-content">
            <button class="close-btn" onclick="toggleModal('inventory-modal')">✖</button>
            <h3>🎒 Твои Артефакты</h3>
            <div id="inventory-list" class="inv-grid"></div>
        </div>
    </div>

    <div id="talents-modal" class="modal hidden">
        <div class="modal-content">
            <button class="close-btn" onclick="toggleModal('talents-modal')">✖</button>
            <h3>💎 Древо Талантов</h3>
            <div class="shop-list" id="talents-list">
                <div class="shop-item">
                    <span>❤️ Здоровье (+10%)</span>
                    <button class="talent-btn" onclick="upgradeTalent('hpBonus')">1💎</button>
                </div>
                <div class="shop-item">
                    <span>⚡ Реген Энергии (+5%)</span>
                    <button class="talent-btn" onclick="upgradeTalent('energyRegen')">1💎</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
