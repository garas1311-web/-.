<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Immortal Squad: Full RPG Reborn</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <header>
            <h1><span id="rank-icon">🌑</span> <span id="rank-name">Новичок</span></h1>
            <div id="location-name">📍 Этап: <span id="stage-display">1</span> (<span id="loc-text">Лес</span>)</div>
        </header>

        <section id="dashboard-profile">
            <div class="profile-main">
                <div id="progression-avatar">
                    <svg viewBox="0 0 50 50">
                        <circle cx="25" cy="25" r="20" fill="#2c3e50" stroke="#ffd700" stroke-width="2"/>
                        <path d="M25 12 L35 35 L15 35 Z" fill="#f1c40f"/>
                    </svg>
                </div>
                <div class="stats-header">
                    <span>Ур. <span id="level">1</span></span>
                    <span class="stat-gold">💰 <span id="gold">0</span></span>
                </div>
            </div>
            <div class="stat-label">Опыт: <span id="exp">0</span>/<span id="next-lvl-exp">100</span></div>
            <div class="progress-bar exp"><div id="exp-fill"></div></div>
            <div class="hp-bar-container">
                <div class="hp-label">❤️ Отряд: <span id="hp">100</span>/<span id="max-hp">100</span></div>
                <div class="progress-bar hp"><div id="hp-fill"></div></div>
            </div>
        </section>

        <section id="battle-arena" class="loc-Лес">
            <div id="squad-stage">
                <div class="unit" id="unit-knight">
                    <svg viewBox="0 0 60 90" class="hero-svg">
                        <path d="M20 35 Q 5 50 15 75 L35 75 Q 45 50 30 35" fill="#8e0000"/>
                        <rect x="18" y="35" width="24" height="35" fill="#34495e" rx="3" stroke="#f1c40f" stroke-width="1"/>
                        <path d="M18 18 L42 18 L42 38 L18 38 Z" fill="#5d6d7e" stroke="#f1c40f" stroke-width="1.5"/>
                        <rect x="22" y="24" width="16" height="3" fill="#1a1a1a"/>
                        <circle cx="18" cy="38" r="6" fill="#f1c40f"/> <circle cx="42" cy="38" r="6" fill="#f1c40f"/>
                        <g transform="rotate(-15 45 45)"><rect x="42" y="30" width="4" height="35" fill="#ecf0f1" stroke="#2c3e50" stroke-width="0.5"/><rect x="38" y="55" width="12" height="3" fill="#f1c40f"/></g>
                    </svg>
                </div>
                <div class="unit hidden" id="unit-archer">
                    <svg viewBox="0 0 60 90" class="hero-svg">
                        <path d="M20 35 Q 5 50 15 75 L35 75 Q 45 50 30 35" fill="#1e5128"/>
                        <rect x="20" y="35" width="20" height="35" fill="#5c4033" rx="3" stroke="#d4af37" stroke-width="1"/>
                        <path d="M18 18 L42 18 L42 38 L18 38 Z" fill="#2d3436" stroke="#1e5128" stroke-width="1.5"/>
                        <rect x="22" y="24" width="16" height="4" fill="#111"/>
                        <path d="M45 25 Q 60 45 45 65" stroke="#8b4513" fill="none" stroke-width="3"/>
                        <line x1="45" y1="25" x2="45" y2="65" stroke="#ecf0f1" stroke-width="1"/>
                    </svg>
                    <div class="projectile arrow-proj">➡️</div>
                </div>
                <div class="unit hidden" id="unit-mage">
                    <svg viewBox="0 0 60 90" class="hero-svg">
                        <path d="M15 35 L45 35 L50 80 L10 80 Z" fill="#301934" stroke="#8e44ad" stroke-width="1"/>
                        <path d="M20 15 L40 15 L40 35 L20 35 Z" fill="#1a0b2e" />
                        <circle cx="30" cy="25" r="3" fill="#00ffff"/>
                        <rect x="45" y="10" width="4" height="70" fill="#4a3b32"/>
                        <circle cx="47" cy="10" r="8" fill="#ff00ff" class="orb-glow"/>
                    </svg>
                    <div class="projectile spell-proj">✨</div>
                </div>
            </div>

            <div id="enemy-stage">
                <div id="enemy-sprite">🐺</div>
                <div class="enemy-hp-bar"><div id="enemy-hp-fill"></div></div>
                <div id="enemy-name">Лесной Волк</div>
            </div>
            
            <div id="combat-text-layer"></div>
        </section>

        <section class="actions-grid">
            <button id="btn-adventure" class="danger-btn" onclick="startCombatLoop()">⚔️ Приключение</button>
            <button id="btn-rest" class="heal-btn" onclick="restSquad()">🛌 Привал (Heal)</button>
        </section>

        <section id="shop-panel">
            <h3>🛒 Лагерь & Кузница</h3>
            <div class="shop-tabs">
                <button class="tab-btn active" onclick="switchTab('upgrades')">Снаряжение</button>
                <button class="tab-btn" onclick="switchTab('mercs')">Наёмники</button>
            </div>
            
            <div id="tab-upgrades" class="shop-list tab-content active">
                <div class="shop-item"><span>⚔️ Заточка мечей (+10 Урон)</span><button onclick="buyItem('dmg', 50)">50г</button></div>
                <div class="shop-item"><span>🛡️ Укрепление брони (+20 Макс HP)</span><button onclick="buyItem('hp', 80)">80г</button></div>
            </div>

            <div id="tab-mercs" class="shop-list tab-content">
                <div class="shop-item" id="merc-archer"><span>🏹 Нанять Лучника (Доп. атака)</span><button class="gold-btn" onclick="buyMerc('archer', 200)">200г</button></div>
                <div class="shop-item" id="merc-mage"><span>🔮 Нанять Мага (Доп. маг. атака)</span><button class="gold-btn" onclick="buyMerc('mage', 500)">500г</button></div>
            </div>
        </section>

        <div id="log-panel"><div id="game-log"><div>> Отряд готов. Нажми "Приключение", чтобы начать поход!</div></div></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
